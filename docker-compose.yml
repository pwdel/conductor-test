services:
  mcp-doc-server:
    image: "${APP_IMAGE:?APP_IMAGE is required}"
    container_name: "${CONTAINER_NAME:?CONTAINER_NAME is required}"
    ports:
      - "${HOST_PORT:-8005}:8005"
    volumes:
      - type: bind
        source: .
        target: /workspace
    working_dir: /workspace
    command:
      - uvicorn
      - mcp_doc_server.http_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8005"
    restart: unless-stopped
